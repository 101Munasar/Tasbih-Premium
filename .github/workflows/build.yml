name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Initialize Cordova Project
      run: |
        npm install -g cordova
        cordova create myapp com.munasar.tasbihpro TasbihPro
        mv index.html myapp/www/index.html
        
    - name: Build Android Platform and APK
      run: |
        cd myapp
        cordova platform add android
        cordova build android --no-telemetry

    - name: Upload Downloadable APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Tasbih-Pro-APK
        path: myapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
